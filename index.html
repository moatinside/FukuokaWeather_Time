<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    color: #e0e0f0;
    height: 100vh; overflow: hidden;
    /* 静的グラデーション（アニメーションなし） */
    background: linear-gradient(135deg, #0a0a1a 0%, #151030 40%, #0a1a2a 70%, #0a0a1a 100%);
  }

  .dashboard {
    display: -webkit-flex; display: flex;
    -webkit-flex-direction: column; flex-direction: column;
    height: 100vh;
    padding: 8px 10px 6px 10px;
    padding-top: constant(safe-area-inset-top);
    padding-top: env(safe-area-inset-top);
    gap: 6px;
  }

  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 10px 14px;
    overflow: hidden;
  }

  /* ===== 上段 ===== */
  .top-row {
    display: -webkit-flex; display: flex; gap: 6px;
    -webkit-flex-shrink: 0; flex-shrink: 0;
  }

  .clock-card {
    -webkit-flex: 1; flex: 1;
    text-align: center; padding: 12px 10px;
    display: -webkit-flex; display: flex;
    -webkit-flex-direction: column; flex-direction: column;
    -webkit-justify-content: center; justify-content: center;
  }
  .time-display {
    font-size: 68px; font-weight: 200; letter-spacing: 3px;
    line-height: 1; color: #e8eeff;
  }
  .date-display {
    font-size: 15px; font-weight: 300; color: rgba(255,255,255,0.5);
    margin-top: 6px; letter-spacing: 2px;
  }

  .current-weather-card {
    -webkit-flex: 1; flex: 1;
    display: -webkit-flex; display: flex;
    -webkit-align-items: center; align-items: center;
    gap: 14px; padding: 10px 18px;
  }
  .current-icon { font-size: 50px; line-height: 1; }
  .current-info { -webkit-flex: 1; flex: 1; }
  .current-temp { font-size: 40px; font-weight: 200; line-height: 1; }
  .current-temp .unit { font-size: 18px; opacity: 0.5; vertical-align: top; }
  .current-desc { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 2px; }
  .current-detail-text {
    font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px;
  }
  .current-details {
    display: -webkit-flex; display: flex; gap: 8px; margin-top: 5px;
    font-size: 11px; color: rgba(255,255,255,0.4);
    -webkit-flex-wrap: wrap; flex-wrap: wrap;
  }
  .current-details span {
    display: -webkit-flex; display: flex;
    -webkit-align-items: center; align-items: center; gap: 2px;
  }
  .location-name { font-size: 10px; color: rgba(255,255,255,0.2); margin-top: 4px; }

  /* ===== 中段 ===== */
  .pop-card { -webkit-flex-shrink: 0; flex-shrink: 0; padding: 8px 14px 10px; }
  .section-title {
    font-size: 10px; letter-spacing: 2px;
    color: rgba(255,255,255,0.25); margin-bottom: 6px;
  }
  .forecast-summary {
    display: -webkit-flex; display: flex; gap: 6px; margin-bottom: 8px;
  }
  .day-summary {
    -webkit-flex: 1; flex: 1; padding: 6px 10px;
    background: rgba(255,255,255,0.03); border-radius: 10px;
    display: -webkit-flex; display: flex;
    -webkit-align-items: center; align-items: center; gap: 8px;
  }
  .day-summary-label { font-size: 11px; color: rgba(255,255,255,0.35); min-width: 36px; }
  .day-summary-icon { font-size: 22px; }
  .day-summary-text {
    font-size: 13px; color: rgba(255,255,255,0.5);
    -webkit-flex: 1; flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .pop-scroll {
    display: -webkit-flex; display: flex; gap: 5px;
    overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px;
  }
  .pop-scroll::-webkit-scrollbar { display: none; }
  .pop-block {
    -webkit-flex: 1; flex: 1;
    text-align: center; padding: 8px 6px; border-radius: 12px; min-width: 0;
  }
  .pop-block.now {
    background: rgba(100,140,255,0.12);
    border: 1px solid rgba(100,140,255,0.2);
  }
  .pop-block .pop-day { font-size: 9px; color: rgba(255,255,255,0.25); margin-bottom: 1px; }
  .pop-block .pop-time { font-size: 11px; color: rgba(255,255,255,0.45); margin-bottom: 4px; }
  .pop-block .pop-icon { font-size: 20px; margin-bottom: 3px; }
  .pop-block .pop-value { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .pop-block .pop-bar-bg {
    height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden;
  }
  .pop-block .pop-bar-fill { height: 100%; border-radius: 2px; }

  /* ===== 下段 ===== */
  .weekly-card {
    -webkit-flex: 1; flex: 1; overflow: hidden;
    display: -webkit-flex; display: flex;
    -webkit-flex-direction: column; flex-direction: column;
    padding: 8px 14px 10px;
  }
  .weekly-list {
    -webkit-flex: 1; flex: 1;
    display: -webkit-flex; display: flex;
    -webkit-flex-direction: column; flex-direction: column;
    -webkit-justify-content: space-around; justify-content: space-around;
  }
  .day-row {
    display: -webkit-flex; display: flex;
    -webkit-align-items: center; align-items: center;
    padding: 6px; border-radius: 10px;
  }
  .day-row.today { background: rgba(100,140,255,0.08); }
  .day-name { width: 40px; font-size: 15px; font-weight: 500; }
  .day-name.sun { color: #ff8a80; }
  .day-name.sat { color: #90caf9; }
  .day-date { width: 56px; font-size: 12px; color: rgba(255,255,255,0.3); }
  .day-icon { width: 40px; font-size: 24px; text-align: center; }
  .day-desc {
    -webkit-flex: 1; flex: 1; font-size: 13px; color: rgba(255,255,255,0.45);
    padding: 0 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .day-temp-bar {
    display: -webkit-flex; display: flex;
    -webkit-align-items: center; align-items: center; gap: 6px; width: 220px;
  }
  .day-low { width: 36px; text-align: right; font-size: 14px; color: #64b5f6; }
  .day-bar-container {
    -webkit-flex: 1; flex: 1; height: 5px;
    background: rgba(255,255,255,0.06); border-radius: 3px;
    position: relative; overflow: hidden;
  }
  .day-bar {
    position: absolute; height: 100%; border-radius: 3px;
    background: linear-gradient(to right, #64b5f6, #ffa726);
  }
  .day-high { width: 36px; font-size: 14px; color: #ffa726; }
  .day-pop-col { width: 52px; text-align: right; font-size: 12px; color: #64b5f6; }
  .day-rel {
    width: 22px; text-align: center; font-size: 10px;
    padding: 1px 3px; border-radius: 3px; margin-left: 4px;
  }
  .rel-A { background: rgba(100,200,100,0.2); color: #81c784; }
  .rel-B { background: rgba(255,200,50,0.2); color: #ffd54f; }
  .rel-C { background: rgba(255,100,100,0.2); color: #e57373; }

  .temp-cold { color: #90caf9; }
  .temp-cool { color: #a5d6a7; }
  .temp-mild { color: #fff59d; }
  .temp-warm { color: #ffcc02; }
  .temp-hot  { color: #ff8a65; }
  .temp-very-hot { color: #ef5350; }

  .loading {
    display: -webkit-flex; display: flex;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;
    height: 100%; font-size: 14px; color: rgba(255,255,255,0.3);
  }
  .status-bar {
    display: -webkit-flex; display: flex;
    -webkit-justify-content: space-between; justify-content: space-between;
    font-size: 9px; color: rgba(255,255,255,0.12);
    padding: 2px 4px 0; -webkit-flex-shrink: 0; flex-shrink: 0;
  }
  .error-msg { color: #ff8a80; font-size: 13px; text-align: center; padding: 20px; }
</style>
</head>
<body>

<div class="dashboard">
  <div class="top-row">
    <div class="card clock-card">
      <div class="time-display" id="timeDisplay">--:--</div>
      <div class="date-display" id="dateDisplay">----年--月--日</div>
    </div>
    <div class="card current-weather-card" id="currentWeather">
      <div class="loading">取得中...</div>
    </div>
  </div>

  <div class="card pop-card">
    <div class="section-title">⏱ 天気と降水確率</div>
    <div class="forecast-summary" id="forecastSummary"></div>
    <div class="pop-scroll" id="popScroll">
      <div class="loading">取得中...</div>
    </div>
  </div>

  <div class="card weekly-card">
    <div class="section-title">📅 週間予報</div>
    <div class="weekly-list" id="weeklyList">
      <div class="loading">取得中...</div>
    </div>
  </div>

  <div class="status-bar">
    <span id="locationInfo">📍 気象庁予報</span>
    <span id="lastUpdate">最終更新: --:--</span>
  </div>
</div>

<script>
var CONFIG = {
  areaCode: '400000',
  amedasStation: '82182',
  cityName: '福岡'
};

var JMA_ICONS = {
  '100':'☀️','101':'🌤','102':'☀️🌂','103':'☀️🌂','104':'☀️🌨',
  '110':'🌤☁','111':'🌤☁','112':'🌤🌧','113':'🌤🌧','114':'🌤🌨','115':'🌤❄',
  '130':'🌤🌧','131':'🌤🌧',
  '200':'☁️','201':'☁🌤','202':'☁🌂','203':'☁🌧','204':'☁🌨',
  '205':'☁❄','206':'☁🌧','207':'☁🌧','208':'☁🌧',
  '210':'☁🌤','211':'☁🌤','212':'☁🌧','213':'☁🌧','214':'☁🌧','215':'☁❄',
  '300':'🌧','301':'🌧🌤','302':'🌧☁','303':'🌧❄','304':'🌧🌨',
  '306':'🌧⚡','308':'⛈','311':'🌧🌤','313':'🌧☁','314':'🌧❄',
  '400':'❄️','401':'❄🌤','402':'❄☁','403':'❄🌧','406':'❄⛈',
  '411':'❄🌤','413':'❄☁','414':'❄🌧'
};
var JMA_DESCS = {
  '100':'晴れ','101':'晴れ時々曇り','102':'晴れ一時雨','103':'晴れ時々雨','104':'晴れ一時雪',
  '110':'晴れ後曇り','111':'晴れ後曇り','112':'晴れ後雨','113':'晴れ後時々雨','114':'晴れ後雨か雪','115':'晴れ後雪',
  '130':'晴れ朝夕雨','131':'晴れ朝夕雨',
  '200':'曇り','201':'曇り時々晴れ','202':'曇り一時雨','203':'曇り時々雨','204':'曇り一時雪',
  '205':'曇り時々雪','206':'曇り一時雨か雪','207':'曇り時々雨か雪','208':'曇り後雨か雪',
  '210':'曇り後晴れ','211':'曇り後晴れ','212':'曇り後雨','213':'曇り後時々雨','214':'曇り後雨か雪','215':'曇り後雪',
  '300':'雨','301':'雨時々晴れ','302':'雨時々曇り','303':'雨時々雪','304':'雨か雪',
  '306':'大雨','308':'暴風雨','311':'雨後晴れ','313':'雨後曇り','314':'雨後雪',
  '400':'雪','401':'雪時々晴れ','402':'雪時々曇り','403':'雪時々雨','406':'暴風雪',
  '411':'雪後晴れ','413':'雪後曇り','414':'雪後雨'
};

function jmaIcon(c){c=String(c);if(JMA_ICONS[c])return JMA_ICONS[c];var f=c.charAt(0);return f==='1'?'☀️':f==='2'?'☁️':f==='3'?'🌧':f==='4'?'❄️':'🌈';}
function jmaDesc(c){c=String(c);if(JMA_DESCS[c])return JMA_DESCS[c];var f=c.charAt(0);return f==='1'?'晴れ':f==='2'?'曇り':f==='3'?'雨':f==='4'?'雪':'―';}
function pad2(n){return n<10?'0'+n:''+n;}
function getTempClass(t){var v=parseFloat(t);if(isNaN(v))return '';if(v<=5)return 'temp-cold';if(v<=15)return 'temp-cool';if(v<=22)return 'temp-mild';if(v<=28)return 'temp-warm';if(v<=33)return 'temp-hot';return 'temp-very-hot';}
function getPopColor(p){var v=parseInt(p)||0;if(v<=10)return '#66bb6a';if(v<=30)return '#aed581';if(v<=50)return '#ffd54f';if(v<=70)return '#64b5f6';return '#42a5f5';}
function dateKey(iso){return iso.split('T')[0];}
function dateKeyToObj(k){var p=k.split('-');return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));}
function cleanWeather(t){return t?t.replace(/　/g,' ').replace(/\s+/g,' ').trim():'';}
var WIND_DIRS=['静穏','北','北北東','北東','東北東','東','東南東','南東','南南東','南','南南西','南西','西南西','西','西北西','北西','北北西'];

// ===== 時計（毎分更新・秒なし） =====
function updateClock(){
  var now=new Date();
  document.getElementById('timeDisplay').textContent=
    pad2(now.getHours())+':'+pad2(now.getMinutes());
  var days=['日','月','火','水','木','金','土'];
  var dc=now.getDay()===0?'#ff8a80':now.getDay()===6?'#90caf9':'inherit';
  document.getElementById('dateDisplay').innerHTML=
    now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日'+
    ' <span style="color:'+dc+'">'+days[now.getDay()]+'曜日</span>';
}

// ===== データ取得 =====
function fetchAll(){
  var amedasP=fetchAmedas();
  var forecastP=fetch('https://www.jma.go.jp/bosai/forecast/data/forecast/'+CONFIG.areaCode+'.json')
    .then(function(r){return r.json();}).catch(function(){return null;});
  Promise.all([amedasP,forecastP]).then(function(res){
    var amedas=res[0],forecast=res[1];
    if(!forecast){
      document.getElementById('currentWeather').innerHTML='<div class="error-msg">⚠️ データ取得失敗</div>';
      return;
    }
    renderCurrent(amedas,forecast);
    renderPop(forecast);
    renderWeekly(forecast);
    var now=new Date();
    document.getElementById('lastUpdate').textContent='最終更新: '+pad2(now.getHours())+':'+pad2(now.getMinutes());
    document.getElementById('locationInfo').textContent='📍 '+CONFIG.cityName+'（気象庁）';
  });
}

function fetchAmedas(){
  return fetch('https://www.jma.go.jp/bosai/amedas/data/latest_time.txt')
    .then(function(r){return r.text();})
    .then(function(ts){
      var key=ts.trim().replace('+09:00','').replace(/[-T:]/g,'').substring(0,14);
      return fetch('https://www.jma.go.jp/bosai/amedas/data/map/'+key+'.json');
    })
    .then(function(r){return r.json();})
    .then(function(map){
      var s=map[CONFIG.amedasStation];
      if(!s)return null;
      return{
        temp:s.temp?s.temp[0]:null,humidity:s.humidity?s.humidity[0]:null,
        wind:s.wind?s.wind[0]:null,windDir:s.windDirection?s.windDirection[0]:0,
        pressure:s.normalPressure?s.normalPressure[0]:null
      };
    }).catch(function(){return null;});
}

function renderCurrent(amedas,forecast){
  var ts0=forecast[0].timeSeries;
  var todayCode=ts0[0].areas[0].weatherCodes[0];
  var todayText='';
  if(ts0[0].areas[0].weathers)todayText=cleanWeather(ts0[0].areas[0].weathers[0]);
  var todayHigh='--',todayLow='--';
  try{
    var tDefs=ts0[2].timeDefines,tVals=ts0[2].areas[0].temps;
    var todayDk=dateKey(ts0[0].timeDefines[0]);
    for(var i=0;i<tDefs.length;i++){
      var h=parseInt(tDefs[i].split('T')[1].split(':')[0]);
      if(dateKey(tDefs[i])===todayDk&&tVals[i]!==''){if(h<=6)todayLow=tVals[i];else todayHigh=tVals[i];}
    }
  }catch(e){}
  var displayTemp='--',tempForClass=20;
  if(amedas&&amedas.temp!==null){displayTemp=Math.round(amedas.temp*10)/10;tempForClass=amedas.temp;}
  else if(todayHigh!=='--'){displayTemp=todayHigh;tempForClass=parseFloat(todayHigh);}
  var extras='';
  if(amedas){
    if(amedas.humidity!==null)extras+='<span>💧'+amedas.humidity+'%</span>';
    if(amedas.wind!==null)extras+='<span>🌬'+(WIND_DIRS[amedas.windDir]||'')+' '+amedas.wind+'m/s</span>';
    if(amedas.pressure!==null)extras+='<span>🔵'+amedas.pressure+'hPa</span>';
  }
  document.getElementById('currentWeather').innerHTML=
    '<div class="current-icon">'+jmaIcon(todayCode)+'</div>'+
    '<div class="current-info">'+
      '<div class="current-temp '+getTempClass(tempForClass)+'">'+displayTemp+'<span class="unit">°C</span></div>'+
      '<div class="current-desc">'+jmaDesc(todayCode)+'</div>'+
      (todayText?'<div class="current-detail-text">'+todayText+'</div>':'')+
      '<div class="current-details">'+
        '<span>↑<span class="temp-warm">'+todayHigh+'°</span></span>'+
        '<span>↓<span class="temp-cold">'+todayLow+'°</span></span>'+extras+
      '</div>'+
      '<div class="location-name">📍 '+CONFIG.cityName+(amedas?'（実況）':'（予報値）')+'</div>'+
    '</div>';
}

function renderPop(forecast){
  var ts0=forecast[0].timeSeries,codes=ts0[0].areas[0].weatherCodes;
  var sumHtml='';
  for(var s=0;s<codes.length&&s<3;s++){
    var lbl=s===0?'今日':s===1?'明日':'明後日';
    sumHtml+='<div class="day-summary"><div class="day-summary-label">'+lbl+'</div><div class="day-summary-icon">'+jmaIcon(codes[s])+'</div><div class="day-summary-text">'+jmaDesc(codes[s])+'</div></div>';
  }
  document.getElementById('forecastSummary').innerHTML=sumHtml;
  var popDefs=ts0[1].timeDefines,pops=ts0[1].areas[0].pops;
  var now=new Date(),todayStr=now.getFullYear()+'-'+pad2(now.getMonth()+1)+'-'+pad2(now.getDate());
  var html='',prevDk='';
  for(var i=0;i<popDefs.length;i++){
    var tStr=popDefs[i],dk=dateKey(tStr);
    var startH=parseInt(tStr.split('T')[1].split(':')[0]),endH=startH+6;if(endH>24)endH=24;
    var pop=pops[i]||'―',popVal=parseInt(pop)||0;
    var dayLabel='';
    if(dk!==prevDk){
      if(dk===todayStr)dayLabel='今日';
      else{var dd=dateKeyToObj(dk);var tmr=new Date(now.getTime()+86400000);dayLabel=dd.toDateString()===tmr.toDateString()?'明日':(dd.getMonth()+1)+'/'+dd.getDate();}
      prevDk=dk;
    }
    var bStart=new Date(tStr),bEnd=new Date(bStart.getTime()+6*3600000);
    var isCur=(now>=bStart&&now<bEnd);
    var codeIdx=0;
    for(var ci=0;ci<ts0[0].timeDefines.length;ci++){if(dateKey(ts0[0].timeDefines[ci])===dk){codeIdx=ci;break;}}
    html+='<div class="pop-block'+(isCur?' now':'')+'"><div class="pop-day">'+(dayLabel||'&nbsp;')+'</div><div class="pop-time">'+startH+'-'+endH+'時</div><div class="pop-icon">'+jmaIcon(codes[codeIdx])+'</div><div class="pop-value" style="color:'+getPopColor(popVal)+'">'+pop+'%</div><div class="pop-bar-bg"><div class="pop-bar-fill" style="width:'+popVal+'%;background:'+getPopColor(popVal)+'"></div></div></div>';
  }
  document.getElementById('popScroll').innerHTML=html;
}

function renderWeekly(forecast){
  var now=new Date(),todayStr=now.getFullYear()+'-'+pad2(now.getMonth()+1)+'-'+pad2(now.getDate());
  var dayNames=['日','月','火','水','木','金','土'],dayMap={};
  try{var s0=forecast[0].timeSeries[0];for(var a=0;a<s0.timeDefines.length;a++){var k0=dateKey(s0.timeDefines[a]);if(!dayMap[k0])dayMap[k0]={};dayMap[k0].code=s0.areas[0].weatherCodes[a];if(s0.areas[0].weathers)dayMap[k0].weather=cleanWeather(s0.areas[0].weathers[a]);}}catch(e){}
  try{var s1=forecast[0].timeSeries[1];for(var b=0;b<s1.timeDefines.length;b++){var k1=dateKey(s1.timeDefines[b]);if(!dayMap[k1])dayMap[k1]={};var pv=parseInt(s1.areas[0].pops[b])||0;if(!dayMap[k1].pop||pv>dayMap[k1].pop)dayMap[k1].pop=pv;}}catch(e){}
  try{var s2=forecast[0].timeSeries[2];for(var c=0;c<s2.timeDefines.length;c++){var k2=dateKey(s2.timeDefines[c]);var h2=parseInt(s2.timeDefines[c].split('T')[1].split(':')[0]);var tv=s2.areas[0].temps[c];if(tv==='')continue;if(!dayMap[k2])dayMap[k2]={};if(h2<=6)dayMap[k2].low=tv;else dayMap[k2].high=tv;}}catch(e){}
  try{var w0=forecast[1].timeSeries[0];for(var d=0;d<w0.timeDefines.length;d++){var k3=dateKey(w0.timeDefines[d]);if(!dayMap[k3])dayMap[k3]={};if(!dayMap[k3].code)dayMap[k3].code=w0.areas[0].weatherCodes[d];if(dayMap[k3].pop===undefined)dayMap[k3].pop=parseInt(w0.areas[0].pops[d])||0;if(w0.areas[0].reliabilities)dayMap[k3].rel=w0.areas[0].reliabilities[d];}}catch(e){}
  try{var w1=forecast[1].timeSeries[1];for(var e2=0;e2<w1.timeDefines.length;e2++){var k4=dateKey(w1.timeDefines[e2]);if(!dayMap[k4])dayMap[k4]={};if(!dayMap[k4].low&&w1.areas[0].tempsMin[e2]!=='')dayMap[k4].low=w1.areas[0].tempsMin[e2];if(!dayMap[k4].high&&w1.areas[0].tempsMax[e2]!=='')dayMap[k4].high=w1.areas[0].tempsMax[e2];}}catch(e){}
  var sorted=Object.keys(dayMap).sort();
  var allMin=100,allMax=-100;
  for(var f=0;f<sorted.length;f++){var lo=parseFloat(dayMap[sorted[f]].low),hi=parseFloat(dayMap[sorted[f]].high);if(!isNaN(lo)&&lo<allMin)allMin=lo;if(!isNaN(hi)&&hi>allMax)allMax=hi;}
  var range=(allMax-allMin)||1;
  var html='';
  for(var g=0;g<sorted.length;g++){
    var key=sorted[g],data=dayMap[key],date=dateKeyToObj(key),di=date.getDay();
    var isToday=(key===todayStr);
    var tmr2=new Date(now.getTime()+86400000);
    var label=isToday?'今日':date.toDateString()===tmr2.toDateString()?'明日':(date.getMonth()+1)+'/'+date.getDate();
    var low=data.low||'--',high=data.high||'--';
    var barLeft=0,barWidth=100;
    if(low!=='--'&&high!=='--'){barLeft=(parseFloat(low)-allMin)/range*100;barWidth=(parseFloat(high)-parseFloat(low))/range*100;if(barWidth<2)barWidth=2;}
    var relHtml='';
    if(data.rel&&data.rel!=='')relHtml='<span class="day-rel rel-'+data.rel+'">'+data.rel+'</span>';
    html+='<div class="day-row'+(isToday?' today':'')+'"><div class="day-name'+(di===0?' sun':di===6?' sat':'')+'">'+dayNames[di]+'</div><div class="day-date">'+label+'</div><div class="day-icon">'+jmaIcon(data.code)+'</div><div class="day-desc">'+jmaDesc(data.code)+'</div><div class="day-temp-bar"><div class="day-low">'+low+'°</div><div class="day-bar-container"><div class="day-bar" style="left:'+barLeft+'%;width:'+barWidth+'%"></div></div><div class="day-high">'+high+'°</div></div><div class="day-pop-col">'+(data.pop?'💧'+data.pop+'%':'')+'</div>'+relHtml+'</div>';
  }
  document.getElementById('weeklyList').innerHTML=html;
}

// ===== 起動 =====
updateClock();
setInterval(updateClock, 60000); // ★ 毎分更新（毎秒→毎分）
fetchAll();
setInterval(fetchAll, 30*60*1000);
setTimeout(function(){location.reload();}, 6*60*60*1000);
</script>
